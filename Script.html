<script>
google.charts.load('current',{packages:['corechart']});
const state={products:[],categories:[],stats:{},page:'dashboard',search:'',pageNo:1,pageSize:Number(localStorage.getItem('pageSize')||12),view:localStorage.getItem('view')||'grid',selected:new Set(),csvRows:[]};
const $=(s,r=document)=>r.querySelector(s), $$=(s,r=document)=>[...r.querySelectorAll(s)];
const esc=s=>String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
const money=n=>new Intl.NumberFormat('id-ID',{style:'currency',currency:'IDR',maximumFractionDigits:0}).format(Number(n)||0);
const pct=n=>`${Number(n||0).toLocaleString('id-ID',{maximumFractionDigits:2})}%`;
const server=(fn,...args)=>new Promise((resolve,reject)=>google.script.run.withSuccessHandler(resolve).withFailureHandler(e=>reject(new Error(e.message||e)))[fn](...args));

document.addEventListener('DOMContentLoaded',init);
async function init(){
  bindEvents(); applyPreferences();
  try{await loadData(); google.charts.setOnLoadCallback(drawCharts);}catch(e){toast(e.message,'error');}
  $('#loader').style.opacity='0';setTimeout(()=>$('#loader').remove(),300);
}
async function loadData(){const data=await server('getAppData');state.products=data.products||[];state.categories=data.categories||[];state.stats=data.stats||{};$('#userLabel').textContent=data.user||'Database pribadi';renderAll();}
function renderAll(){renderStats();renderProducts();renderCategories();renderFavorites();renderRecent();populateFilters();if(window.google?.visualization)drawCharts();}
function bindEvents(){
  document.addEventListener('click',async e=>{const el=e.target.closest('[data-page],[data-action]');if(!el)return;if(el.dataset.page)navigate(el.dataset.page);if(el.dataset.action)handleAction(el.dataset.action,el);});
  $('#globalSearch').addEventListener('input',e=>{state.search=e.target.value.toLowerCase();state.pageNo=1;if(state.page==='dashboard'&&state.search)navigate('products');else renderProducts();});
  ['categoryFilter','storeFilter','statusFilter','commissionFilter','priceFilter','salesFilter','sortSelect'].forEach(id=>$('#'+id).addEventListener('change',()=>{state.pageNo=1;renderProducts();}));
  $('#selectAll').addEventListener('change',e=>{$$('.product-check').forEach(x=>{x.checked=e.target.checked;e.target.checked?state.selected.add(x.value):state.selected.delete(x.value)});updateBulk();});
  $('#bulkDelete').addEventListener('click',()=>removeProducts([...state.selected]));
  $$('.view-toggle button').forEach(b=>b.onclick=()=>setView(b.dataset.view));
  $('#themeBtn').onclick=toggleTheme;$('#settingsTheme').onclick=toggleTheme;$('#settingsView').onchange=e=>setView(e.target.value);
  $('#pageSize').value=state.pageSize;$('#settingsView').value=state.view;$('#pageSize').onchange=e=>{state.pageSize=Number(e.target.value);state.pageNo=1;localStorage.setItem('pageSize',state.pageSize);renderProducts();};
  $('#menuBtn').onclick=()=>{$('#sidebar').classList.add('open');$('#backdrop').classList.add('show')};$('#backdrop').onclick=closeMenu;
  $('#chooseCsv').onclick=()=>$('#csvFile').click();$('#dropZone').onclick=e=>{if(!e.target.closest('button'))$('#csvFile').click()};$('#csvFile').onchange=e=>readCsv(e.target.files[0]);
  ['dragover','drop'].forEach(type=>$('#dropZone').addEventListener(type,e=>{e.preventDefault();if(type==='drop')readCsv(e.dataTransfer.files[0]);}));$('#startImport').onclick=startImport;
  window.addEventListener('resize',()=>{clearTimeout(window.chartTimer);window.chartTimer=setTimeout(drawCharts,150)});
}
function navigate(page){state.page=page;$$('.page').forEach(x=>x.classList.toggle('active',x.id===`page-${page}`));$$('.nav-item').forEach(x=>x.classList.toggle('active',x.dataset.page===page));closeMenu();if(page==='products')renderProducts();}
function closeMenu(){$('#sidebar').classList.remove('open');$('#backdrop').classList.remove('show')}
function applyPreferences(){document.body.classList.toggle('dark',localStorage.getItem('theme')==='dark');}
function toggleTheme(){document.body.classList.toggle('dark');localStorage.setItem('theme',document.body.classList.contains('dark')?'dark':'light');setTimeout(drawCharts,50)}

function renderStats(){const s=state.stats,cards=[['▦','Total Produk',s.total||0],['◈','Total Kategori',s.categories||0],['↗','Rata-rata Komisi',pct(s.averageCommission)],['★','Komisi Tertinggi',pct(s.highestCommission)],['↓','Komisi Terendah',pct(s.lowestCommission)],['＋','Impor Hari Ini',s.today||0],['◷','Produk Terbaru',s.newest||'—'],['◴','Produk Terlama',s.oldest||'—']];$('#statsGrid').innerHTML=cards.map(c=>`<article class="stat-card"><div class="stat-icon">${c[0]}</div><strong title="${esc(c[2])}">${esc(c[2])}</strong><small>${c[1]}</small></article>`).join('');}
function productCard(p){return `<article class="product-card"><button class="favorite-btn ${p.favorite?'on':''}" data-action="favorite" data-id="${esc(p.id)}" title="Favorit">${p.favorite?'♥':'♡'}</button><div class="product-image">${p.imageUrl?`<img loading="lazy" src="${esc(p.imageUrl)}" alt="">`:'◫'}</div><div class="product-body"><div class="product-top"><input class="product-check" type="checkbox" value="${esc(p.id)}" ${state.selected.has(p.id)?'checked':''}><div><h3 class="product-title" title="${esc(p.name)}">${esc(p.name)}</h3><div class="product-meta">${esc(p.store||'Tanpa toko')} · ${esc(p.category)}</div></div></div><div class="metrics"><div class="metric"><small>HARGA</small><strong>${money(p.price)}</strong></div><div class="metric"><small>KOMISI</small><strong>${pct(p.commission)}</strong></div><div class="metric"><small>PENJUALAN</small><strong>${Number(p.sales).toLocaleString('id-ID')}</strong></div></div><div class="card-actions"><button class="primary-action" data-action="copy-link" data-id="${esc(p.id)}">Salin Tautan</button><button data-action="open" data-id="${esc(p.id)}">Buka Produk</button><button data-action="copy-name" data-id="${esc(p.id)}">Salin Nama</button><button data-action="copy-both" data-id="${esc(p.id)}">Nama + Tautan</button><button data-action="copy-extra" data-id="${esc(p.id)}">Tautan Ekstra</button><button data-action="edit" data-id="${esc(p.id)}">Ubah</button><button data-action="delete" data-id="${esc(p.id)}">Hapus</button></div></div></article>`}
function filtered(){let a=state.products.filter(p=>!state.search||[p.name,p.store,p.category].some(v=>String(v).toLowerCase().includes(state.search)));const vals=id=>$('#'+id)?.value||'';if(vals('categoryFilter'))a=a.filter(p=>p.category===vals('categoryFilter'));if(vals('storeFilter'))a=a.filter(p=>p.store===vals('storeFilter'));if(vals('statusFilter'))a=a.filter(p=>p.status===vals('statusFilter'));[['commissionFilter','commission'],['priceFilter','price'],['salesFilter','sales']].forEach(([id,key])=>{if(vals(id)){const [min,max]=vals(id).split('-').map(Number);a=a.filter(p=>p[key]>=min&&p[key]<=max)}});const sort=vals('sortSelect')||'newest',cmp={newest:(a,b)=>new Date(b.createdAt)-new Date(a.createdAt),oldest:(a,b)=>new Date(a.createdAt)-new Date(b.createdAt),'commission-desc':(a,b)=>b.commission-a.commission,'commission-asc':(a,b)=>a.commission-b.commission,'sales-desc':(a,b)=>b.sales-a.sales,'sales-asc':(a,b)=>a.sales-b.sales,az:(a,b)=>a.name.localeCompare(b.name),za:(a,b)=>b.name.localeCompare(a.name)}[sort];return a.sort(cmp)}
function renderProducts(){const all=filtered(),pages=Math.max(1,Math.ceil(all.length/state.pageSize));state.pageNo=Math.min(state.pageNo,pages);const shown=all.slice((state.pageNo-1)*state.pageSize,state.pageNo*state.pageSize),grid=$('#productGrid');grid.className=`product-grid ${state.view==='compact'?'compact':''}`;grid.innerHTML=shown.length?shown.map(productCard).join(''):'<div class="empty"><h3>Produk tidak ditemukan</h3><p>Coba ubah pencarian atau filter Anda.</p></div>';$('#resultCount').textContent=`${all.length} produk`;$$('.product-check').forEach(x=>x.onchange=()=>{x.checked?state.selected.add(x.value):state.selected.delete(x.value);updateBulk()});renderPagination(pages);updateBulk();}
function renderPagination(pages){let html='';for(let i=1;i<=pages;i++)if(pages<=7||i===1||i===pages||Math.abs(i-state.pageNo)<=1)html+=`<button class="${i===state.pageNo?'active':''}" data-action="page" data-value="${i}">${i}</button>`;else if(!html.endsWith('…</button>'))html+='<button disabled>…</button>';$('#pagination').innerHTML=html;}
function setView(v){state.view=v;localStorage.setItem('view',v);$$('.view-toggle button').forEach(b=>b.classList.toggle('active',b.dataset.view===v));$('#settingsView').value=v;renderProducts()}
function updateBulk(){$('#bulkDelete').classList.toggle('hidden',!state.selected.size)}
function populateFilters(){[['categoryFilter','category'],['storeFilter','store']].forEach(([id,key])=>{const el=$('#'+id),value=el.value,first=el.options[0].outerHTML,values=key==='category'?state.categories:[...new Set(state.products.map(p=>p[key]).filter(Boolean))].sort();el.innerHTML=first+values.map(v=>`<option>${esc(v)}</option>`).join('');el.value=value;});}

function renderRecent(){const a=state.products.slice().sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).slice(0,5);$('#recentProducts').innerHTML=a.length?a.map(p=>`<div class="mini-row"><div class="thumb">${p.imageUrl?`<img loading="lazy" src="${esc(p.imageUrl)}">`:'◫'}</div><div><strong>${esc(p.name)}</strong><small>${esc(p.store)} · ${new Date(p.createdAt).toLocaleDateString('id-ID')}</small></div><span class="badge">${pct(p.commission)}</span><span class="money">${money(p.price)}</span></div>`).join(''):'<div class="empty">Tambahkan produk pertama Anda untuk memulai.</div>'}
function renderFavorites(){const a=state.products.filter(p=>p.favorite);$('#favoriteGrid').innerHTML=a.length?a.map(productCard).join(''):'<div class="empty"><h3>Belum ada favorit</h3><p>Ketuk ikon hati pada produk untuk akses cepat.</p></div>'}
function renderCategories(){const map={};state.products.forEach(p=>map[p.category]=(map[p.category]||0)+1);$('#categoryList').innerHTML=state.categories.map(n=>`<article class="category-card"><div class="category-icon">◈</div><div class="grow"><h3>${esc(n)}</h3><small>${map[n]||0} produk</small></div><div class="tiny-actions"><button data-action="rename-category" data-name="${esc(n)}" title="Ubah nama">✎</button><button data-action="delete-category" data-name="${esc(n)}" title="Hapus">⌫</button></div></article>`).join('')||'<div class="empty">Buat kategori atau tambahkan produk pertama Anda.</div>'}
function drawCharts(){if(!window.google?.visualization||!$('#categoryChart'))return;const dark=document.body.classList.contains('dark'),text=dark?'#94a3b8':'#64748b',bg='transparent',cat={};state.products.forEach(p=>cat[p.category]=(cat[p.category]||0)+1);const cdata=google.visualization.arrayToDataTable([['Kategori','Produk'],...Object.entries(cat).slice(0,8)]);new google.visualization.PieChart($('#categoryChart')).draw(cdata,{backgroundColor:bg,legend:{textStyle:{color:text}},pieHole:.62,colors:['#ff6a00','#ffb347','#16a34a','#6366f1','#ec4899','#06b6d4'],chartArea:{width:'90%',height:'85%'}});const stores={};state.products.forEach(p=>(stores[p.store]||(stores[p.store]=[])).push(p.commission));const rows=Object.entries(stores).map(([s,a])=>[s,a.reduce((x,y)=>x+y,0)/a.length]).sort((a,b)=>b[1]-a[1]).slice(0,7),data=google.visualization.arrayToDataTable([['Toko','Komisi',{role:'style'}],...rows.map(r=>[r[0],r[1],'#ff6a00'])]);new google.visualization.ColumnChart($('#commissionChart')).draw(data,{backgroundColor:bg,legend:'none',hAxis:{textStyle:{color:text}},vAxis:{textStyle:{color:text},format:"#'%'",minValue:0},chartArea:{left:45,top:20,width:'85%',height:'72%'}})}

async function handleAction(a,el){const id=el.dataset.id,p=state.products.find(x=>x.id===id);if(a==='new-product')openProductModal();if(a==='edit')openProductModal(p);if(a==='delete')removeProducts([id]);if(a==='favorite'&&p)await favorite(p);if(a==='copy-link')copy(p?.affiliateLink);if(a==='copy-extra')copy(p?.extraLink);if(a==='copy-name')copy(p?.name);if(a==='copy-both')copy(`${p?.name}\n${p?.affiliateLink}`);if(a==='open'&&p?.affiliateLink)window.open(p.affiliateLink,'_blank','noopener');if(a==='refresh'){await loadData();toast('Data berhasil disegarkan.')}if(a==='page'){state.pageNo=Number(el.dataset.value);renderProducts();scrollTo({top:0,behavior:'smooth'})}if(a==='new-category')categoryPrompt();if(a==='rename-category')categoryPrompt(el.dataset.name);if(a==='delete-category')removeCategory(el.dataset.name)}
async function copy(text){if(!text)return toast('Tautan tidak tersedia.','error');try{await navigator.clipboard.writeText(text);toast('Berhasil Disalin');}catch(e){const t=document.createElement('textarea');t.value=text;document.body.append(t);t.select();document.execCommand('copy');t.remove();toast('Berhasil Disalin')}}
async function favorite(p){try{p.favorite=!p.favorite;renderAll();await server('setFavorite',p.id,p.favorite);toast(p.favorite?'Ditambahkan ke favorit.':'Dihapus dari favorit.')}catch(e){p.favorite=!p.favorite;renderAll();toast(e.message,'error')}}
async function removeProducts(ids){if(!ids.length||!confirm(`Hapus ${ids.length} produk? Tindakan ini tidak dapat dibatalkan.`))return;try{await server('deleteProducts',ids);state.selected.clear();await loadData();toast('Produk berhasil dihapus.')}catch(e){toast(e.message,'error')}}

function openProductModal(p={}){const fields=[['name','Nama Produk','text',true],['category','Kategori','text',true],['store','Toko','text',false],['price','Harga','number',false],['sales','Penjualan','number',false],['commission','Komisi (%)','number',false],['affiliateLink','Tautan Afiliasi','url',false],['extraLink','Tautan Komisi Ekstra','url',false],['imageUrl','URL Gambar (opsional)','url',false]];$('#modalRoot').innerHTML=`<div class="modal-wrap"><form class="modal" id="productForm"><div class="modal-head"><div><p class="eyebrow">PRODUK</p><h2>${p.id?'Ubah':'Tambah'} Produk</h2></div><button type="button" class="close-btn">×</button></div><div class="form-grid">${fields.map(f=>`<div class="field ${f[0].includes('Link')||f[0]==='imageUrl'?'full':''}"><label>${f[1]}</label><input name="${f[0]}" type="${f[2]}" ${f[3]?'required':''} step="any" value="${esc(p[f[0]]??'')}"></div>`).join('')}<div class="field"><label>Status</label><select name="status"><option value="Active" ${p.status!=='Inactive'?'selected':''}>Aktif</option><option value="Inactive" ${p.status==='Inactive'?'selected':''}>Tidak Aktif</option></select></div></div><div class="modal-actions"><button type="button" class="btn secondary close-modal">Batal</button><button class="btn primary">Simpan Produk</button></div></form></div>`;const close=()=>$('#modalRoot').innerHTML='';$$('.close-btn,.close-modal').forEach(x=>x.onclick=close);$('#productForm').onsubmit=async e=>{e.preventDefault();const data=Object.fromEntries(new FormData(e.target));Object.assign(data,{id:p.id||'',createdAt:p.createdAt||'',favorite:p.favorite||false});const btn=e.submitter;btn.disabled=true;btn.textContent='Menyimpan…';try{await server('saveProduct',data);close();await loadData();toast(p.id?'Produk berhasil diperbarui.':'Produk berhasil ditambahkan.')}catch(err){toast(err.message,'error');btn.disabled=false;btn.textContent='Simpan Produk'}}}
function categoryPrompt(old=''){const name=prompt(old?`Ubah nama “${old}” menjadi:`:'Nama kategori:',old);if(!name||name===old)return;server(old?'renameCategory':'createCategory',...(old?[old,name]:[name])).then(loadData).then(()=>toast(old?'Nama kategori berhasil diubah.':'Kategori berhasil dibuat.')).catch(e=>toast(e.message,'error'))}
function removeCategory(name){if(confirm(`Hapus “${name}”? Produk akan dipindahkan ke Uncategorized.`))server('deleteCategory',name).then(loadData).then(()=>toast('Kategori berhasil dihapus.')).catch(e=>toast(e.message,'error'))}

function parseCsv(text){const rows=[];let row=[],cell='',quote=false;for(let i=0;i<text.length;i++){const c=text[i],n=text[i+1];if(c==='"'&&quote&&n==='"'){cell+='"';i++}else if(c==='"')quote=!quote;else if(c===','&&!quote){row.push(cell);cell=''}else if((c==='\n'||c==='\r')&&!quote){if(c==='\r'&&n==='\n')i++;row.push(cell);if(row.some(x=>x.trim()))rows.push(row);row=[];cell=''}else cell+=c}row.push(cell);if(row.some(x=>x.trim()))rows.push(row);if(rows.length<2)throw new Error('CSV harus memiliki header dan minimal satu baris data.');const headers=rows.shift().map(x=>x.trim().replace(/^\uFEFF/,''));if(!headers.includes('Product Name'))throw new Error('Kolom wajib tidak ditemukan: Product Name');return rows.map(r=>Object.fromEntries(headers.map((h,i)=>[h,(r[i]||'').trim()]))) }
function readCsv(file){if(!file)return;if(!/\.csv$/i.test(file.name))return toast('Silakan pilih berkas CSV.','error');const reader=new FileReader();reader.onload=()=>{try{state.csvRows=parseCsv(reader.result);renderCsvPreview()}catch(e){toast(e.message,'error')}};reader.readAsText(file)}
function renderCsvPreview(){const rows=state.csvRows,headers=Object.keys(rows[0]||{}),labels={'Product Name':'Nama Produk','Category':'Kategori','Store':'Toko','Price':'Harga','Sales':'Penjualan','Commission':'Komisi','Affiliate Link':'Tautan Afiliasi','Extra Commission Link':'Tautan Komisi Ekstra','Status':'Status','Created At':'Dibuat Pada','Image URL':'URL Gambar'};$('#importPreview').classList.remove('hidden');$('#previewMeta').textContent=`${rows.length.toLocaleString('id-ID')} baris siap divalidasi`;$('#previewHead').innerHTML='<tr>'+headers.map(h=>`<th>${esc(labels[h]||h)}</th>`).join('')+'</tr>';$('#previewBody').innerHTML=rows.slice(0,20).map(r=>'<tr>'+headers.map(h=>`<td>${esc(r[h])}</td>`).join('')+'</tr>').join('');$('#importReport').innerHTML=''}
async function startImport(){const btn=$('#startImport'),progress=$('#importProgress'),bar=$('#progressBar');btn.disabled=true;progress.classList.remove('hidden');bar.style.width='35%';try{const report=await server('importCsvRows',state.csvRows);bar.style.width='100%';$('#importReport').innerHTML=`<div class="panel"><h3>Impor selesai</h3><p><b>${report.imported}</b> diimpor · <b>${report.duplicates}</b> duplikat dilewati · <b>${report.errors.length}</b> kesalahan</p>${report.errors.length?`<small>${report.errors.map(esc).join('<br>')}</small>`:''}</div>`;await loadData();toast(`${report.imported} produk berhasil diimpor.`)}catch(e){toast(e.message,'error');bar.style.width='0'}finally{btn.disabled=false}}
function toast(message,type='success'){const el=document.createElement('div');el.className=`toast ${type}`;el.textContent=message;$('#toastRoot').append(el);setTimeout(()=>el.remove(),3200)}
</script>
